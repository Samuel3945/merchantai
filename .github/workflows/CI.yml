name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        node-version: [24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    name: Build with ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js environment
        uses: ./.github/actions/setup-project
        with:
          node-version: ${{ matrix.node-version }}

      - name: Restore or cache Next.js build
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
          # Generate a new cache whenever packages or source files change.
          key: nextjs-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**') }}

      - name: Build Next.js
        # Run the REAL build, not build-local's `run-p db-server build:next --race`.
        # The --race made this gate non-deterministic (it could exit on the
        # pglite/db:migrate side regardless of the build) and let a broken
        # production build slip through CI. next build needs no DB at build time
        # (migrations run at container startup), so a plain build:next is correct.
        run: npm run build:next
        env:
          NEXT_PUBLIC_SENTRY_DISABLED: 'true' # Only upload Sentry source maps in deployment
          NEXT_PUBLIC_APP_URL: http://localhost:3008
          # CI build is a compile check, not a deploy — skip server env validation
          # (real env vars live in the VPS/Easypanel runtime, not in CI).
          SKIP_ENV_VALIDATION: 'true'
          # Build-time only; the runtime key comes from the deployment env.
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: 'YhpHdhNUpnXwlS6N8zxuNLO2NDFCTczJNUHXypDTT2Q='

      - if: matrix.node-version == '24.x' && success()
        name: Cache Next.js build output
        uses: actions/cache/save@v5
        with:
          path: |
            .next
            next-env.d.ts
          key: nextjs-build-${{ matrix.node-version }}-${{ github.sha }}

  static:
    strategy:
      matrix:
        node-version: [24.x]

    name: Run static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Retrieve Git history, needed to verify commits

      - name: Set up Node.js environment
        uses: ./.github/actions/setup-project
        with:
          node-version: ${{ matrix.node-version }}

      - if: github.event_name == 'pull_request'
        name: Validate all commits from PR
        run: npx commitlint --from $BASE_SHA --to $HEAD_SHA --verbose
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Linter
        run: npx next typegen && npm run lint

      - name: Type checking
        run: npm run check:types

      - name: Check dependencies
        run: npm run check:deps

      - name: I18n check
        run: npm run check:i18n

  unit:
    strategy:
      matrix:
        node-version: [24.x]

    name: Run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js environment
        uses: ./.github/actions/setup-project
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run unit tests
        uses: docker://mcr.microsoft.com/playwright:v1.60.0
        with:
          args: npm run test -- --coverage

  e2e:
    strategy:
      matrix:
        node-version: [24.x]

    name: Run E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js environment
        uses: ./.github/actions/setup-project
        with:
          node-version: ${{ matrix.node-version }}
          restore-nextjs-cache: true

      - name: Run E2E tests
        uses: docker://mcr.microsoft.com/playwright:v1.60.0
        with:
          args: sh -c "HOME=/root npm run test:e2e" # Set HOME to /root to avoid Playwright error with Firefox
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
